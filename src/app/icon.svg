<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0058B9"/>
      <stop offset="100%" stop-color="#004493"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>
  <!-- Leaf shape - representing nutrition/health -->
  <g transform="translate(256,256)">
    <!-- Main leaf -->
    <path d="M-20,120 C-20,120 -120,-20 -80,-120 C-40,-220 80,-180 120,-80 C160,20 20,120 -20,120 Z"
          fill="#ADC6FF" opacity="0.9"/>
    <!-- Leaf vein (center) -->
    <path d="M-20,120 C0,40 40,-40 80,-100"
          fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
    <!-- Side veins -->
    <path d="M-5,70 C20,50 45,45 70,30"
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <path d="M10,20 C30,5 55,-10 75,-30"
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <path d="M-15,80 C-35,60 -55,45 -70,20"
          fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.5"/>
    <!-- Small checkmark at bottom-right of leaf -->
    <g transform="translate(60,60)">
      <circle cx="0" cy="0" r="36" fill="#ffffff"/>
      <path d="M-14,2 L-4,12 L16,-10"
            fill="none" stroke="#004493" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>
